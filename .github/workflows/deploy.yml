name: Deploy Site Estático via FTP na Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar o repositório
        uses: actions/checkout@v3

      - name: Configurar Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Build do projeto
        run: npm run build

      - name: Verificar estrutura estática
        run: |
          echo "=== Verificando estrutura do dist ===" 
          ls -la dist/
          echo ""
          echo "=== Verificando index.html da raiz ===" 
          head -20 dist/index.html
          echo ""
          echo "=== Verificando pastas estáticas ===" 
          find dist -name "index.html" -type f | head -20
          echo ""
          echo "=== Verificando se NÃO há arquivos SPA ===" 
          if grep -q "root" dist/index.html && grep -q "<script" dist/index.html; then
            echo "⚠️ AVISO: index.html parece ser do SPA"
          else
            echo "✓ index.html parece ser estático"
          fi

      - name: Deploy FTP para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          port: 21
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: true
          dry-run: false
          log-level: verbose
